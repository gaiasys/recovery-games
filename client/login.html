<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — SUD Education Game</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: min(420px, 100%);
      background: var(--bg-panel);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      padding: 36px 32px 32px;
    }

    .login-card h1 {
      margin: 0 0 6px;
      font-size: 22px;
      color: var(--text-bright);
    }

    .login-card p {
      margin: 0 0 28px;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }

    .field label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-cyan);
    }

    .field input {
      padding: 11px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-medium);
      background: rgba(5, 14, 24, 0.96);
      color: var(--text-main);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.14s, box-shadow 0.14s;
    }

    .field input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 3px var(--accent-cyan-soft);
    }

    .login-error {
      min-height: 20px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--accent-red);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--accent-cyan);
      color: #06101a;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.14s;
    }

    .login-btn:hover:not(:disabled) { opacity: 0.88; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Sign In</h1>
    <p>Enter your username and 4-digit PIN to continue.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          autocomplete="username"
          autocapitalize="none"
          spellcheck="false"
          maxlength="64"
          required
        />
      </div>

      <div class="field">
        <label for="pin">4-Digit PIN</label>
        <input
          id="pin"
          type="password"
          inputmode="numeric"
          autocomplete="current-password"
          maxlength="4"
          placeholder="••••"
          required
        />
      </div>

      <p id="loginError" class="login-error" aria-live="polite"></p>

      <button id="submitBtn" class="login-btn" type="submit">Sign In</button>
    </form>
  </div>

  <script type="module">
    import { checkSession, login } from './js/auth.js';

    // Already authenticated — skip login
    checkSession().then(user => {
      if (user) window.location.replace('/index.html');
    });

    const form     = document.getElementById('loginForm');
    const errorEl  = document.getElementById('loginError');
    const submitBtn = document.getElementById('submitBtn');
    const pinInput  = document.getElementById('pin');

    // Strip non-digits as the user types
    pinInput.addEventListener('input', () => {
      pinInput.value = pinInput.value.replace(/\D/g, '').slice(0, 4);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';

      const username = document.getElementById('username').value.trim();
      const pin      = pinInput.value;

      if (!username) {
        errorEl.textContent = 'Please enter your username.';
        return;
      }
      if (!/^\d{4}$/.test(pin)) {
        errorEl.textContent = 'PIN must be exactly 4 digits.';
        return;
      }

      submitBtn.disabled    = true;
      submitBtn.textContent = 'Signing in…';

      try {
        await login(username, pin);
        window.location.replace('/index.html');
      } catch (err) {
        errorEl.textContent = err.message === 'Failed to fetch'
          ? 'Could not reach the server. Check your connection.'
          : 'Invalid username or PIN.';
        pinInput.value        = '';
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Sign In';
        pinInput.focus();
      }
    });
  </script>
</body>
</html>
